<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Silkscreen&family=Pixelify+Sans:wght@400..700&family=DotGothic16&family=Tiny5&family=Sixtyfour&family=Micro+5&family=Bungee&family=Bungee+Outline&family=Monofett&family=Creepster&family=Plaster&family=Rye&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --pixel-border-color: #0d2b45;
      --pixel-bg-color: #203c56;
      --pixel-content-bg-color: rgba(0, 0, 0, 0.4);
      --pixel-highlight-color: #fca311;

      /* A 9-slice border image for panels and windows, now with theme-friendly corners */
      --pixel-border-image: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M0 0H8V2H2V8H0V0ZM22 0H16V2H22V8H24V0H22ZM0 24V16H2V22H8V24H0ZM22 24H16V22H22V16H24V24H22ZM8 2H16V0H8V2ZM2 8H0V16H2V8ZM22 8V16H24V8H22ZM8 22H16V24H8V22Z" fill="%23999999"/></svg>');
      --pixel-divider-image: url('data:image/svg+xml;utf8,<svg width="8" height="2" viewBox="0 0 8 2" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 0H8V1H0V0Z" fill="%23999999"/><path d="M0 1H8V2H0V1Z" fill="%23000000"/></svg>');
    }

    body {
      font-family: 'VT323', monospace;
      background-color: #1a1a1a;
      color: #fff;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      margin: 0;
      overflow: hidden;
      /* Evita que la página entera haga scroll */
    }

    /* Clase para ocultar barras de scroll pero permitir el movimiento programático */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .pixel-box {
      border: 4px solid var(--pixel-border-color);
      box-shadow: inset 0 0 0 4px var(--pixel-border-color);
    }

    .pixel-panel {
      border-style: solid;
      border-width: 8px;
      border-image-slice: 8;
      border-image-width: 8px;
      border-image-repeat: repeat;
      border-image-source: var(--pixel-border-image);
      background-color: var(--pixel-bg-color);
      padding: 0.5rem;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5), 0 0 5px var(--pixel-border-color);
    }

    .pixel-divider {
      height: 2px;
      border: 0;
      margin-top: 1rem;
      margin-bottom: 1rem;
      border-style: solid;
      border-width: 2px 0 0 0;
      border-image-slice: 2;
      border-image-width: 2px 0 0 0;
      border-image-repeat: stretch;
      border-image-source: var(--pixel-divider-image);
    }

    .pixel-button {
      border: 4px solid var(--pixel-border-color);
      box-shadow: inset 0 0 0 4px var(--pixel-border-color), 0 0 5px var(--pixel-border-color);
      background-color: #1a1a1a;
      transition: all 0.1s ease-in-out;
      position: relative;
      overflow: hidden;
    }

    .pixel-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(255, 255, 255, 0.1), transparent);
      pointer-events: none;
    }

    .pixel-button:hover {
      background-color: #333;
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 4px var(--pixel-border-color), 0 0 15px var(--pixel-border-color);
    }

    .pixel-button:active,
    .pixel-button-active {
      background-color: var(--pixel-highlight-color);
      transform: translateY(2px);
      box-shadow: inset 2px 2px 0px 2px rgba(0, 0, 0, 0.3), 0 0 20px var(--pixel-highlight-color);
    }

    .pixel-button:disabled {
      background-color: #444;
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .pixel-content-box {
      background-color: var(--pixel-content-bg-color);
      border: 4px solid var(--pixel-border-color);
      padding: 0.5rem;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    /* Scanline effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg,
          rgba(255, 0, 0, 0.02),
          rgba(0, 255, 0, 0.01),
          rgba(0, 0, 255, 0.02));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.3;
    }

    .pixel-input {
      background-color: var(--pixel-content-bg-color);
      border: 4px solid var(--pixel-border-color);
      padding: 0.5rem;
      color: #FFFFFF;
      font-family: 'VT323', monospace;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    .pixel-input::placeholder {
      color: #a0a0a0;
      opacity: 1;
    }

    .pixel-input:focus,
    .pixel-input:focus-visible {
      outline: 4px solid var(--pixel-highlight-color);
      outline-offset: -4px;
      background-color: var(--pixel-bg-color);
      box-shadow: 0 0 15px var(--pixel-highlight-color);
    }

    select.pixel-input {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1.5em 1.5em;
      padding-right: 2.5rem;
    }

    .pixel-input::-webkit-outer-spin-button,
    .pixel-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .pixel-input[type=number] {
      -moz-appearance: textfield;
    }

    .neon-text {
      text-shadow: 0 0 5px var(--pixel-highlight-color), 0 0 10px var(--pixel-highlight-color);
    }

    @keyframes floating {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .effect-floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes glitch {
      0% {
        transform: translate(0);
      }

      20% {
        transform: translate(-2px, 2px);
      }

      40% {
        transform: translate(-2px, -2px);
      }

      60% {
        transform: translate(2px, 2px);
      }

      80% {
        transform: translate(2px, -2px);
      }

      100% {
        transform: translate(0);
      }
    }

    .effect-glitch {
      animation: glitch 0.1s steps(2) infinite;
      filter: drop-shadow(2px 0 red) drop-shadow(-2px 0 blue);
    }

    @keyframes rainbow {
      0% {
        filter: hue-rotate(0deg);
      }

      100% {
        filter: hue-rotate(360deg);
      }
    }

    .effect-rainbow {
      animation: rainbow 5s linear infinite;
    }

    .effect-scanlines {
      position: relative;
    }

    .effect-scanlines::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%,
          rgba(0, 0, 0, 0.2) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes hologram {
      0% {
        opacity: 0.7;
        filter: brightness(1.1) saturate(1.2) drop-shadow(0 0 2px #00ffff);
      }

      50% {
        opacity: 1;
        filter: brightness(1.3) saturate(1.5) drop-shadow(0 0 5px #00ffff);
      }

      100% {
        opacity: 0.7;
        filter: brightness(1.1) saturate(1.2) drop-shadow(0 0 2px #00ffff);
      }
    }

    .effect-hologram {
      animation: hologram 0.2s infinite;
      position: relative;
      filter: sepia(1) hue-rotate(140deg) saturate(3) brightness(1.1) !important;
    }

    .effect-hologram::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          rgba(0, 255, 255, 0.1),
          rgba(0, 255, 255, 0.1) 1px,
          transparent 1px,
          transparent 2px);
      pointer-events: none;
      z-index: 5;
    }


    @keyframes scan-sweep {

      0%,
      100% {
        top: 0%;
        opacity: 0;
      }

      5% {
        opacity: 0.8;
      }

      45% {
        opacity: 0.8;
      }

      50% {
        top: 100%;
        opacity: 0;
      }

      55% {
        top: 100%;
        opacity: 0;
      }

      95% {
        opacity: 0.8;
      }

      100% {
        top: 0%;
        opacity: 0;
      }
    }

    .effect-terminal-scan {
      position: relative;
      overflow: hidden;
    }

    .effect-terminal-scan::before {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: #00ffff;
      box-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
      z-index: 10;
      pointer-events: none;
      animation: scan-sweep 3s linear infinite;
    }

    .effect-terminal-scan::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0, 255, 255, 0.05) 50%, transparent 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 5;
      opacity: 0.3;
    }

    @keyframes shake {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-2px, 2px);
      }

      50% {
        transform: translate(2px, -2px);
      }

      75% {
        transform: translate(-2px, -2px);
      }

      100% {
        transform: translate(2px, 2px);
      }
    }

    .effect-shake {
      animation: shake 0.1s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    .effect-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .effect-blur {
      filter: blur(2px);
    }

    .pixel-text {
      word-break: break-all;
    }

    .pixel-text::selection {
      background: rgba(249, 115, 22, 0.55);
      color: inherit;
    }

    /* Screen Filters */
    .filter-crt {
      position: relative;
      overflow: hidden;
    }

    .filter-crt::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .filter-crt::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 100;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% {
        opacity: 0.27861;
      }

      5% {
        opacity: 0.34769;
      }

      10% {
        opacity: 0.23604;
      }

      15% {
        opacity: 0.90626;
      }

      20% {
        opacity: 0.18128;
      }

      25% {
        opacity: 0.83891;
      }

      30% {
        opacity: 0.65583;
      }

      35% {
        opacity: 0.57807;
      }

      40% {
        opacity: 0.26559;
      }

      45% {
        opacity: 0.84693;
      }

      50% {
        opacity: 0.96019;
      }

      55% {
        opacity: 0.08594;
      }

      60% {
        opacity: 0.20313;
      }

      65% {
        opacity: 0.71988;
      }

      70% {
        opacity: 0.53455;
      }

      75% {
        opacity: 0.37288;
      }

      80% {
        opacity: 0.71428;
      }

      85% {
        opacity: 0.70419;
      }

      90% {
        opacity: 0.7003;
      }

      95% {
        opacity: 0.36108;
      }

      100% {
        opacity: 0.24387;
      }
    }

    .filter-sepia {
      filter: sepia(0.8) contrast(1.2) brightness(0.9);
    }

    .filter-grayscale {
      filter: grayscale(1) contrast(1.2);
    }

    .filter-gameboy {
      filter: sepia(1) hue-rotate(50deg) saturate(3) brightness(0.8) contrast(1.2);
      background-color: #8bac0f !important;
    }

    .filter-glitch {
      animation: glitch 0.2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tutorial-popover {
      animation: fadeIn 0.3s ease-out;
    }

    /* CUSTOM PIXEL SCROLLBAR */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0d2b45;
      border: 2px solid #203c56;
    }

    ::-webkit-scrollbar-thumb {
      background: #fca311;
      border: 2px solid #0d2b45;
      box-shadow: inset 2px 2px 0px rgba(255, 255, 255, 0.3);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ffb703;
    }

    /* Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: #fca311 #0d2b45;
    }
  </style>
